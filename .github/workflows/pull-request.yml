name: Pull Request

on:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Michael.sln

      - name: Build
        run: dotnet build src/Michael.sln --no-restore

      - name: Validate README release asset naming
        run: |
          set -euo pipefail
          readme="README.md"

          grep -Fq 'michael-<tag>-linux-x64.tar.gz' "$readme"
          grep -Fq 'michael-<tag>-osx-arm64.tar.gz' "$readme"
          grep -Fq 'michael-<tag>-win-x64.zip' "$readme"

      - name: Validate release notes generation is enabled
        run: |
          set -euo pipefail
          workflow=".github/workflows/release.yml"

          grep -Fq 'generate_release_notes: true' "$workflow"

      - name: Clean test results directory
        run: |
          rm -rf TestResults/current
          mkdir -p TestResults/current

      - name: Test
        run: dotnet test src/Michael.sln --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults/current

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/current/**/*.trx
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2.6.0
        with:
          name: Unit Test Results
          path: TestResults/current/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
