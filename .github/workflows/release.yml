name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Michael.sln

      - name: Build Release
        run: dotnet build src/Michael.sln --configuration Release --no-restore

      - name: Test Release
        run: dotnet test src/Michael.sln --configuration Release --no-build

      - name: Validate README release asset naming
        run: |
          set -euo pipefail
          readme="README.md"

          grep -Fq 'michael-<tag>-linux-x64.tar.gz' "$readme"
          grep -Fq 'michael-<tag>-osx-arm64.tar.gz' "$readme"
          grep -Fq 'michael-<tag>-win-x64.zip' "$readme"

  publish-native-aot:
    needs: test-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rid: linux-x64
            package: tar.gz
          - runner: windows-latest
            rid: win-x64
            package: zip
          - runner: macos-14
            rid: osx-arm64
            package: tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore for target runtime
        run: dotnet restore src/Michael.Cli/Michael.Cli.csproj -r ${{ matrix.rid }}

      - name: Publish Native AOT binary
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          dotnet publish src/Michael.Cli/Michael.Cli.csproj \
            --configuration Release \
            --framework net10.0 \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishAot=true \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:InformationalVersion="$version" \
            --output artifacts/publish/${{ matrix.rid }}

      - name: Smoke test published binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = "artifacts/publish/${{ matrix.rid }}/Michael.exe"
          if (-not (Test-Path $binary)) {
            throw "Published binary not found: $binary"
          }

          New-Item -ItemType Directory -Path "artifacts/smoke/${{ matrix.rid }}" -Force | Out-Null

          & $binary --input data/sample-dotnet-small.log --output "artifacts/smoke/${{ matrix.rid }}" --analyse-only

          $versionOutput = (& $binary --version | Out-String)
          $expected = ($env:GITHUB_REF_NAME -replace '^v', '')
          if ($versionOutput -notmatch [Regex]::Escape($expected)) {
            throw "Version output '$versionOutput' does not contain expected release version '$expected'"
          }

      - name: Smoke test published binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          binary="artifacts/publish/${{ matrix.rid }}/Michael"

          if [[ ! -f "$binary" ]]; then
            echo "Published binary not found: $binary" >&2
            exit 1
          fi

          chmod +x "$binary"
          mkdir -p "artifacts/smoke/${{ matrix.rid }}"

          "$binary" --input data/sample-dotnet-small.log --output "artifacts/smoke/${{ matrix.rid }}" --analyse-only

          version_output="$($binary --version)"
          expected="${GITHUB_REF_NAME#v}"
          echo "$version_output" | grep -F "$expected" >/dev/null

      - name: Package Windows artifact
        if: matrix.package == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/packages -Force | Out-Null
          New-Item -ItemType Directory -Path "artifacts/package-root/${{ matrix.rid }}" -Force | Out-Null
          Copy-Item -Path "artifacts/publish/${{ matrix.rid }}/*" -Destination "artifacts/package-root/${{ matrix.rid }}" -Recurse -Force
          Copy-Item -Path "README.md" -Destination "artifacts/package-root/${{ matrix.rid }}/README.md" -Force
          Compress-Archive -Path "artifacts/package-root/${{ matrix.rid }}/*" -DestinationPath "artifacts/packages/michael-${{ github.ref_name }}-${{ matrix.rid }}.zip" -Force

      - name: Verify Windows artifact contents
        if: matrix.package == 'zip'
        shell: pwsh
        run: |
          $archive = "artifacts/packages/michael-${{ github.ref_name }}-${{ matrix.rid }}.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($archive)
          try {
            $entryNames = $zip.Entries | ForEach-Object { $_.FullName }

            if (-not ($entryNames | Where-Object { $_ -match '(^|/)README\.md$' })) {
              throw "README.md not found in $archive"
            }

            if (-not ($entryNames | Where-Object { $_ -match '(^|/)michael\.config\.json$' })) {
              throw "michael.config.json not found in $archive"
            }

            if (-not ($entryNames | Where-Object { $_ -match '(^|/)templates/fix-script\.ps1\.template$' })) {
              throw "templates/fix-script.ps1.template not found in $archive"
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Package Unix artifact
        if: matrix.package == 'tar.gz'
        run: |
          set -euo pipefail
          mkdir -p artifacts/packages "artifacts/package-root/${{ matrix.rid }}"
          cp -a "artifacts/publish/${{ matrix.rid }}/." "artifacts/package-root/${{ matrix.rid }}/"
          cp README.md "artifacts/package-root/${{ matrix.rid }}/README.md"
          (
            cd "artifacts/package-root/${{ matrix.rid }}"
            tar -czf "../../../artifacts/packages/michael-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" *
          )

      - name: Verify Unix artifact contents
        if: matrix.package == 'tar.gz'
        run: |
          set -euo pipefail
          archive="artifacts/packages/michael-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz"

          tar -tzf "$archive" | grep -E '(^|/)README\.md$' >/dev/null
          tar -tzf "$archive" | grep -E '(^|/)michael\.config\.json$' >/dev/null
          tar -tzf "$archive" | grep -E '(^|/)templates/fix-script\.ps1\.template$' >/dev/null

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries-${{ matrix.rid }}-${{ github.ref_name }}
          path: artifacts/packages/*
          if-no-files-found: error

  attach-release-assets:
    if: github.event_name == 'release'
    needs: publish-native-aot
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded
          pattern: release-binaries-*-${{ github.ref_name }}
          merge-multiple: true

      - name: Attach assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/downloaded/*
