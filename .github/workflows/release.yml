name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Michael.sln

      - name: Build Release
        run: dotnet build src/Michael.sln --configuration Release --no-restore

      - name: Test Release
        run: dotnet test src/Michael.sln --configuration Release --no-build

      - name: Publish CLI binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts/publish artifacts/packages

          for rid in linux-x64 win-x64 osx-x64; do
            out_dir="artifacts/publish/$rid"
            dotnet publish src/Michael.Cli/Michael.Cli.csproj \
              --configuration Release \
              --framework net10.0 \
              --runtime "$rid" \
              --self-contained false \
              -p:PublishSingleFile=true \
              -p:DebugType=None \
              -p:DebugSymbols=false \
              --output "$out_dir"

            if [[ "$rid" == win-* ]]; then
              (cd "$out_dir" && zip -r "../../packages/michael-${{ github.ref_name }}-$rid.zip" .)
            else
              tar -czf "artifacts/packages/michael-${{ github.ref_name }}-$rid.tar.gz" -C "$out_dir" .
            fi
          done

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ github.ref_name }}
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Attach assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/packages/*
