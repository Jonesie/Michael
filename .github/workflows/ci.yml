name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Michael.sln

      - name: Build
        run: dotnet build src/Michael.sln --no-restore

      - name: Clean test results directory
        run: |
          rm -rf TestResults/current
          mkdir -p TestResults/current

      - name: Test
        run: dotnet test src/Michael.sln --no-build --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults/current

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/current/**/*.trx
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: TestResults/current/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Publish coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/current/**/coverage.cobertura.xml
          format: markdown
          output: both
          badge: true
        continue-on-error: true

      - name: Generate coverage HTML report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"TestResults/current/**/coverage.cobertura.xml" \
            -targetdir:"CoverageReport" \
            -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport/**
          if-no-files-found: warn

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: |
            TestResults/current/**/coverage.cobertura.xml
            code-coverage-results.md
          if-no-files-found: warn
